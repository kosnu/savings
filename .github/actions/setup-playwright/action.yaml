name: "Setup Playwright with Cache"
description: "Setup Playwright with versioned cache for GitHub Actions."
inputs:
  project-directory:
    description: "Relative path to the project package. Default: '.'"
    required: false
    default: "."
runs:
  using: "composite"
  steps:
    - name: Show project-directory
      env:
        PROJECT_DIRECTORY: ${{ inputs.project-directory }}
      run: echo "project-directory=$PROJECT_DIRECTORY"
      shell: bash

    - name: Get Playwright version from node_modules
      id: get_version
      env:
        PROJECT_DIRECTORY: ${{ inputs.project-directory }}
      run: |
        cd "$PROJECT_DIRECTORY"
        VERSION=$(pnpm exec playwright --version | head -n1 | awk '{print $NF}')
        echo "playwright_version=$VERSION" >> $GITHUB_OUTPUT
      shell: bash

    - name: Cache Playwright binaries
      id: playwright-cache
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      env:
        cache-name: cache-playwright-binaries
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ steps.get_version.outputs.playwright_version }}
        restore-keys: |
          ${{ runner.os }}-build-${{ env.cache-name }}-

    - name: Install Playwright
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      env:
        PROJECT_DIRECTORY: ${{ inputs.project-directory }}
      run: |
        set -euo pipefail
        cd "$PROJECT_DIRECTORY"
        pnpm exec playwright install --with-deps chromium
      shell: bash
