name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      skip_web:
        description: "Skip Web Deployment"
        type: boolean
        default: false
      skip_api:
        description: "Skip API Deployment"
        type: boolean
        default: false

permissions:
  contents: read
  deployments: write

jobs:
  # --- Backend (Supabase) のデプロイ ---
  deploy-api:
    if: ${{ github.event.inputs.skip_api != 'true' }} # skip_api が true の場合はこのジョブをスキップ
    runs-on: ubuntu-latest
    environment: production
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      AUTH_SITE_URL: ${{ secrets.AUTH_SITE_URL }}
      AUTH_REDIRECT_URL: ${{ secrets.AUTH_REDIRECT_URL }}
      SUPABASE_GOOGLE_CLIENT_ID: ${{ secrets.SUPABASE_GOOGLE_CLIENT_ID }}
      SUPABASE_GOOGLE_CLIENT_SECRET: ${{ secrets.SUPABASE_GOOGLE_CLIENT_SECRET }}
      SUPABASE_GOOGLE_REDIRECT_URL: ${{ secrets.SUPABASE_GOOGLE_REDIRECT_URL }}
      SUPABASE_GOOGLE_SKIP_NONCE_CHECK: ${{ secrets.SUPABASE_GOOGLE_SKIP_NONCE_CHECK }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@2eca1b4d35d9016e560c763c9159a350aa80c370 # v2
        with:
          version: 2.89.1

      - name: Link Supabase Project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        working-directory: apps/api

      - name: Push Database Migrations
        run: supabase db push
        working-directory: apps/api


  # --- Frontend (React + Vite) のデプロイ ---
  deploy-web:
    if: ${{ github.event.inputs.skip_web != 'true' && (needs.deploy-api.result == 'success' || needs.deploy-api.result == 'skipped') }}
    needs: deploy-api
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@08c4be7e2e672a47d11bd04269e27e5f3e8529cb # v6.0.0
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: "package.json"
          cache: "pnpm"
          cache-dependency-path: "pnpm-lock.yaml"

      - name: Install deps and build
        run: |
          pnpm install --frozen-lockfile
          pnpm --dir apps/web build
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_SENTRY_ENVIRONMENT: production
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65 # v3.14.1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          command: pages deploy apps/web/dist --project-name=savings
