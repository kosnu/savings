name: Frontend CI

on:
  pull_request:
    paths:
      - ".github/workflows/frontend_ci.yaml"
      - "apps/web/**"
    types: [opened, synchronize]
jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web/
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
        with:
          node-version-file: "apps/web/package.json"

      - name: Cache node modules
        uses: ./.github/actions/cache-npm

      - name: Install dependencies
        run: npm ci

      - name: Biome check
        run: npm run check -- --error-on-warnings

      - name: Setup Playwright (with cache)
        uses: ./.github/actions/setup-playwright
        with:
          project-directory: apps/web

      - name: Test
        run: npm run test -- --reporter=dot --silent

      - name: Build
        run: npm run build
