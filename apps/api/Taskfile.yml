# https://taskfile.dev

version: "3"

tasks:
  default:
    aliases:
      - list
    desc: List all tasks
    cmd: task -l

  up:
    desc: Start Supabase and serve functions locally
    cmds:
      - task start:supabase
      - task serve:functions

  down:
    desc: Stop Supabase and functions
    cmds:
      - task stop:functions
      - task stop:supabase

  start:supabase:
    desc: Start Supabase locally
    cmd: npx supabase start

  stop:supabase:
    desc: Stop Supabase locally
    cmd: npx supabase stop

  serve:functions:
    desc: Serve Supabase Edge Functions locally
    cmds:
      - mkdir -p .run
      - sh -c 'nohup npx supabase functions serve > .run/functions.log 2>&1 & echo $! > .run/functions.pid'
  stop:functions:
    desc: Stop background Supabase Edge Functions
    cmds:
      - sh -c 'test -f .run/functions.pid && kill "$(cat .run/functions.pid)" || true'
      - rm -f .run/functions.pid

  logs:functions:
    desc: Tail functions logs
    cmd: tail -f .run/functions.log

  up:migrations:
    desc: Run database migrations to latest
    cmd: npx supabase migration up

  down:migrations:
    desc: Rollback the last database migration
    cmd: npx supabase migration down

  test:
    desc: Run tests for all functions
    cmds:
      - deno test --allow-read --allow-env supabase/functions/payments/
      - deno test --allow-read --allow-env supabase/functions/categories/

  lint:
    desc: Run deno lint for all functions
    cmd: deno lint supabase/functions/

  fmt:
    desc: Run deno fmt for all functions
    cmd: deno fmt supabase/functions/

  fmt:check:
    desc: Check formatting without writing
    cmd: deno fmt --check supabase/functions/

  check:
    desc: Run type check for all functions
    cmds:
      - deno check --config supabase/functions/payments/deno.json supabase/functions/payments/**/*.ts
      - deno check --config supabase/functions/categories/deno.json supabase/functions/categories/**/*.ts

  check:all:
    desc: Run type check, lint, and fmt check
    cmds:
      - task: check
      - task: lint
      - task: fmt:check
