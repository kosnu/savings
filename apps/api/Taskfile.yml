# https://taskfile.dev

version: "3"

tasks:
  default:
    aliases:
      - list
    desc: List all tasks
    cmd: task -l

  up:
    desc: Start Supabase locally
    cmd: pnpm exec supabase start

  down:
    desc: Stop Supabase locally
    cmd: pnpm exec supabase stop

  up:migrations:
    desc: Run database migrations to latest
    cmd: pnpm exec supabase migration up

  down:migrations:
    desc: Rollback the last database migration
    cmd: pnpm exec supabase migration down
